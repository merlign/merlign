<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Merlign High-Res Dark Mode Gradients</title>
  <style>
    body {
      background-color: #050508;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      padding: 40px;
      margin: 0;
      justify-content: center;
    }
    .gradient-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .title {
      color: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
    }
    .gradient-box {
      width: 1080px;
      height: 1080px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      /* Voor weergave in browser */
      max-width: 400px;
      max-height: 400px;
    }

    .gradient-box-tall {
      width: 1080px;
      height: 1920px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      /* Voor weergave in browser */
      max-width: 250px;
      max-height: 444px;
    }

    /* Subtiele Noise Overlay voor die luxe analoge feel */
    .gradient-box::after, .gradient-box-tall::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* 1: The Midnight Glow (Subtiel van onderuit) */
    .bg-1 {
      background: radial-gradient(circle at 50% 150%, rgba(99, 102, 241, 0.15) 0%, #0D0D12 60%);
    }

    /* 2: The Cyber Slash (Zachte glow in de hoek) */
    .bg-2 {
      background: radial-gradient(circle at -10% -10%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                  radial-gradient(circle at 110% 110%, rgba(99, 102, 241, 0.08) 0%, #0D0D12 60%);
      background-color: #0D0D12;
    }

    /* 3: Deep Eclipse (Gecentreerde, broeierige mist) */
    .bg-3 {
      background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.09) 0%, #0D0D12 70%);
    }

    /* 4: The Indigo Horizon (Heel zachte bovenbelichting) */
    .bg-4 {
      background: radial-gradient(ellipse at 50% -50%, rgba(99, 102, 241, 0.18) 0%, #0D0D12 70%);
    }
  </style>
</head>
<body>

  <div class="gradient-wrapper">
    <div class="title">1. The Midnight Glow</div>
    <div style="display:flex; gap:20px; align-items:flex-end;">
       <div class="gradient-box bg-1" title="1080 x 1080"></div>
       <div class="gradient-box-tall bg-1" title="1080 x 1920"></div>
    </div>
  </div>

  <div class="gradient-wrapper">
    <div class="title">2. The Cyber Slash</div>
    <div style="display:flex; gap:20px; align-items:flex-end;">
       <div class="gradient-box bg-2" title="1080 x 1080"></div>
       <div class="gradient-box-tall bg-2" title="1080 x 1920"></div>
    </div>
  </div>

  <div class="gradient-wrapper">
    <div class="title">3. Deep Eclipse</div>
    <div style="display:flex; gap:20px; align-items:flex-end;">
       <div class="gradient-box bg-3" title="1080 x 1080"></div>
       <div class="gradient-box-tall bg-3" title="1080 x 1920"></div>
    </div>
  </div>

  <div class="gradient-wrapper">
    <div class="title">4. The Indigo Horizon</div>
    <div style="display:flex; gap:20px; align-items:flex-end;">
       <div class="gradient-box bg-4" title="1080 x 1080"></div>
       <div class="gradient-box-tall bg-4" title="1080 x 1920"></div>
    </div>
  </div>

</body>
</html>
