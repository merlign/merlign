<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merlign — High-end design & AI-automatisering</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Replacing technical headers with Plus Jakarta Sans and dramatic serif with Lora (Proxima Sera alt) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Outfit:wght@300;400;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Structured Data (Schema.org) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Merlign",
      "url": "https://merlign.com",
      "logo": "https://merlign.com/logo_merlign.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+31 6 47693209",
        "contactType": "sales",
        "areaServed": "NL",
        "availableLanguage": ["Dutch", "English"]
      },
      "sameAs": [
        "https://www.linkedin.com/in/merlijn-van-der-vleuten-1b9118267/"
      ]
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Merlign",
      "url": "https://merlign.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://merlign.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- Noise Overlay handled in CSS for performance -->
</body>

</html>
